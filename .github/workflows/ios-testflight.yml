name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      readonly_match:
        description: "Set to true after the first successful run (safer reruns)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
    tags: ['v*']

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        # XcodeGen emits objectVersion 77 (Xcode 16 project format), so we
        # need Xcode 16.x. macos-15 runners ship it; macos-14 tops out at
        # Xcode 15.4 and would fail with "future Xcode project file format".
        #
        # NOTE: Do NOT pin Xcode 16.2 here. Xcode 16.2 bundles the iOS 18.2 SDK
        # (build 22C146), but macos-15 runners no longer preinstall an iOS 18.2
        # simulator runtime. `actool` validates asset catalogs against the
        # matching iphonesimulator runtime even during a device archive, which
        # causes: "No simulator runtime version from [...] available to use
        # with iphonesimulator SDK version 22C146". Xcode 16.4 ships the iOS
        # 18.4/18.5 SDK which matches a runtime the runner actually has.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode + matching iOS simulator runtime
        # Fast-fail with a helpful message if the runner ever drifts out of
        # alignment again, instead of dying deep inside actool.
        run: |
          xcodebuild -version
          echo "--- Installed iOS simulator runtimes ---"
          xcrun simctl list runtimes | grep -i iOS || true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fastlane beta
        env:
          APPSTORE_API_KEY_ID:           ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID:        ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_KEY_P8:           ${{ secrets.APPSTORE_API_KEY_P8 }}
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
          KEYCHAIN_PASSWORD:             ${{ secrets.KEYCHAIN_PASSWORD }}
          # Use a custom env var name (NOT MATCH_READONLY — that's fastlane's
          # own env var and silently overrides Ruby args).
          MATCH_READONLY_FLAG:           ${{ inputs.readonly_match || 'false' }}
          FASTLANE_HIDE_TIMESTAMP:       "true"
          FASTLANE_SKIP_UPDATE_CHECK:    "true"
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BiteDefense-ipa
          path: ios/build/*.ipa
          if-no-files-found: ignore

      - name: Upload Fastlane logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: ~/Library/Logs/gym/
          if-no-files-found: ignore
