name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      readonly_match:
        description: "Set to true after the first successful run (safer reruns)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
    tags: ['v*']

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fastlane beta
        env:
          APPSTORE_API_KEY_ID:           ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID:        ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_KEY_P8:           ${{ secrets.APPSTORE_API_KEY_P8 }}
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
          KEYCHAIN_PASSWORD:             ${{ secrets.KEYCHAIN_PASSWORD }}
          MATCH_READONLY:                ${{ inputs.readonly_match || 'false' }}
          FASTLANE_HIDE_TIMESTAMP:       "true"
          FASTLANE_SKIP_UPDATE_CHECK:    "true"
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BiteDefense-ipa
          path: ios/build/*.ipa
          if-no-files-found: ignore

      - name: Upload Fastlane logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: ~/Library/Logs/gym/
          if-no-files-found: ignore
