name: BiteDefense
options:
  bundleIdPrefix: com.bitedefense
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: GYFN949Q5E
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  BiteDefense:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BiteDefense
        excludes:
          - "**/.DS_Store"
    resources:
      - path: BiteDefense/Resources/Assets.xcassets
    info:
      path: BiteDefense/App/Info.plist
      properties:
        CFBundleDisplayName: Bite Defense
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Info.plist launch screen (iOS 14+). Avoids ibtool/storyboard compile,
        # which fails on CI when the runner's simulator runtime doesn't match
        # the SDK (e.g. "iOS 18.2 Platform Not Installed").
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitedefense.game
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Debug:
          # Simulator builds in CI: signing disabled. Local Xcode dev: automatic.
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          # TestFlight / App Store: manual signing using the profile that
          # `fastlane match` installs into the keychain on CI.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.bitedefense.game"

  BiteDefenseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BiteDefenseTests
    dependencies:
      - target: BiteDefense
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitedefense.game.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BiteDefense.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BiteDefense

schemes:
  BiteDefense:
    build:
      targets:
        BiteDefense: all
        BiteDefenseTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BiteDefenseTests
    archive:
      config: Release
